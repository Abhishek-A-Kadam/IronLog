<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IronLog</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronLog">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0f0f0f; --card:#1c1c1e; --card2:#2c2c2e;
  --accent:#ff6b35; --green:#30d158; --blue:#0a84ff;
  --text:#ffffff; --muted:#8e8e93; --border:#3a3a3c;
  --danger:#ff453a; --nav-h:64px; --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;overflow-x:hidden;}

/* NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nav-h) + var(--safe-b));background:rgba(28,28,30,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:100;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--muted);transition:color .2s;padding:4px 0;border:none;background:none;font-size:10px;font-weight:600;}
.nav-btn.active{color:var(--accent);}
.nav-btn svg{width:22px;height:22px;}

/* PAGES */
.page{display:none;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 16px);min-height:100vh;}
.page.active{display:block;}

/* HEADER */
.page-header{padding:52px 20px 12px;display:flex;align-items:flex-end;justify-content:space-between;}
.page-title{font-size:30px;font-weight:700;letter-spacing:-.5px;}
.page-subtitle{font-size:13px;color:var(--muted);margin-top:2px;}

/* CARDS */
.card{background:var(--card);border-radius:14px;padding:16px;margin:0 16px 12px;}
.card-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:14px 20px;border-radius:12px;border:none;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s;width:100%;font-family:inherit;}
.btn:active{transform:scale(.97);opacity:.85;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-secondary{background:var(--card2);color:var(--text);}
.btn-ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent);}
.btn-sm{padding:9px 14px;font-size:14px;border-radius:10px;width:auto;}
.btn-xs{padding:5px 10px;font-size:12px;border-radius:7px;width:auto;font-weight:600;}

/* INPUTS */
input,select,textarea{background:var(--card2);border:1.5px solid transparent;border-radius:10px;color:var(--text);font-size:16px;padding:11px 13px;width:100%;outline:none;transition:border-color .2s;font-family:inherit;-webkit-appearance:none;appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);}
select option{background:var(--card);}
label{font-size:13px;color:var(--muted);font-weight:500;display:block;margin-bottom:5px;}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-b));width:100%;max-width:480px;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:20px;font-weight:700;margin-bottom:16px;}

/* FOCUS GRID — visible on homepage */
.focus-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 16px;margin-bottom:8px;}
.focus-tile{background:var(--card);border-radius:12px;padding:14px 8px;text-align:center;cursor:pointer;border:1.5px solid var(--border);transition:border-color .15s,transform .1s,background .15s;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
.focus-tile:active{transform:scale(.95);background:var(--card2);}
.focus-tile:hover{border-color:var(--accent);}
.focus-tile .fi{font-size:24px;margin-bottom:5px;}
.focus-tile .fl{font-size:12px;font-weight:600;line-height:1.2;}
.start-hint{text-align:center;font-size:12px;color:var(--muted);padding:4px 16px 0;}

/* EXERCISE CARD */
.ex-card{background:var(--card);border-radius:14px;margin:0 16px 12px;overflow:hidden;}
.ex-header{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid var(--border);}
.ex-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;background:var(--card2);flex-shrink:0;}
.ex-thumb-ph{width:44px;height:44px;border-radius:8px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.eq-badge{font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;background:var(--card2);color:var(--muted);display:inline-block;margin-right:4px;}

/* SET ROWS */
.set-col-header{display:grid;gap:6px;padding:6px 14px;background:rgba(255,255,255,.03);font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;}
.set-row{display:grid;gap:6px;align-items:center;padding:8px 14px;border-top:1px solid var(--border);}
.grid-perside{grid-template-columns:26px 1fr 56px 1fr 32px;}
.grid-direct{grid-template-columns:26px 1fr 44px 1fr 32px;}
.grid-bw{grid-template-columns:26px 1fr 44px 1fr 32px;}
.set-num{width:26px;height:26px;background:var(--card2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}
.set-num.done{background:var(--green);color:#000;}
.set-input{background:var(--card2);border:none;border-radius:8px;padding:8px 4px;font-size:16px;font-weight:700;text-align:center;color:var(--text);width:100%;font-family:inherit;}
.set-input:focus{outline:2px solid var(--accent);outline-offset:-1px;}
.set-input::placeholder{color:var(--border);font-weight:400;}
.set-lbl{font-size:10px;color:var(--muted);text-align:center;line-height:1.3;}
.set-total{font-size:12px;font-weight:700;color:var(--accent);text-align:center;}
.done-btn{width:32px;height:32px;border-radius:8px;border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;background:var(--card2);color:var(--muted);}
.done-btn.done{background:var(--green);color:#000;}
.set-add-row{padding:10px 14px;}

/* SEARCH RESULTS */
.ex-search-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.ex-search-item:last-child{border-bottom:none;}
.ex-search-item:active{opacity:.6;}
.ex-search-thumb{width:50px;height:50px;border-radius:10px;object-fit:cover;background:var(--card2);flex-shrink:0;}
.ex-search-ph{width:50px;height:50px;border-radius:10px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.ex-search-name{font-size:15px;font-weight:600;}
.ex-search-sub{font-size:12px;color:var(--muted);margin-top:2px;}

/* HISTORY */
.h-item{background:var(--card);border-radius:14px;margin:0 16px 10px;padding:15px;cursor:pointer;}
.h-item:active{opacity:.7;}
.h-name{font-size:16px;font-weight:700;}
.h-date{font-size:13px;color:var(--muted);}
.h-meta{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;}
.h-stat{font-size:12px;color:var(--muted);}
.h-stat span{color:var(--text);font-weight:600;}

/* BODY */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 12px;}
.stat-box{background:var(--card);border-radius:14px;padding:16px;text-align:center;}
.stat-val{font-size:26px;font-weight:700;color:var(--accent);}
.stat-val-unit{font-size:14px;color:var(--muted);}
.stat-label{font-size:12px;color:var(--muted);margin-top:3px;font-weight:500;}
.stat-change{font-size:12px;font-weight:600;margin-top:3px;}
.stat-change.pos{color:var(--danger);}
.stat-change.neg{color:var(--green);}
.meas-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);font-size:14px;}
.meas-row:last-child{border-bottom:none;}
.meas-lbl{color:var(--muted);}

/* PROGRESS */
.chart-container{background:var(--card);border-radius:14px;margin:0 16px 12px;padding:16px;}
.chart-wrap{position:relative;height:190px;}
.pr-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px;}
.pr-row:last-child{border-bottom:none;}
.pr-val{font-weight:700;color:var(--accent);}

/* MISC */
.empty-state{text-align:center;padding:48px 32px;color:var(--muted);}
.empty-icon{font-size:52px;margin-bottom:14px;}
.empty-title{font-size:19px;font-weight:600;color:var(--text);margin-bottom:6px;}
.form-group{margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.flex-between{display:flex;justify-content:space-between;align-items:center;}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.mt16{margin-top:16px;}
.sec-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:0 16px;margin:14px 0 8px;}
.icon-btn{width:32px;height:32px;background:var(--card2);border:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px;flex-shrink:0;}
.icon-btn.danger{color:var(--danger);}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--green);color:#000;padding:12px 22px;border-radius:50px;font-size:15px;font-weight:600;z-index:999;transition:transform .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ═══════ TODAY ═══════ -->
<div class="page active" id="today-page">
  <div class="page-header">
    <div>
      <div class="page-title">IronLog 🏋️</div>
      <div class="page-subtitle" id="today-date"></div>
    </div>
    <div id="streak-el"></div>
  </div>

  <!-- No active workout -->
  <div id="no-workout-ui">
    <div class="start-hint">👇 Tap a tile to start logging</div>
    <div class="sec-label">CHOOSE YOUR FOCUS</div>
    <div class="focus-grid" id="focus-compound-grid"></div>
    <div class="sec-label">MUSCLE GROUP</div>
    <div class="focus-grid" id="focus-muscle-grid"></div>
    <div style="padding:4px 16px 12px;">
      <button class="btn btn-secondary" onclick="startWorkout(null)">＋ Custom Workout</button>
    </div>
    <div class="sec-label">RECENT</div>
    <div id="recent-home"></div>
  </div>

  <!-- Active workout -->
  <div id="active-workout-ui" style="display:none;">
    <div style="padding:14px 16px 8px;">
      <div class="flex-between">
        <div style="flex:1;">
          <input id="workout-name-input" type="text" placeholder="Workout name"
            style="font-size:20px;font-weight:700;background:transparent;border:none;padding:0;width:100%;" />
          <div id="active-focus-badge" style="margin-top:4px;"></div>
        </div>
        <button class="btn btn-sm btn-primary" style="margin-left:10px;" onclick="confirmFinish()">Finish 💪</button>
      </div>
    </div>
    <div id="exercises-container"></div>
    <div style="padding:4px 16px 16px;">
      <button class="btn btn-ghost" onclick="openAddExercise()">＋ Add Exercise</button>
    </div>
  </div>
</div>

<!-- ═══════ HISTORY ═══════ -->
<div class="page" id="history-page">
  <div class="page-header">
    <div><div class="page-title">History</div></div>
    <div id="history-count" style="font-size:13px;color:var(--muted);"></div>
  </div>
  <div id="history-list"></div>
</div>

<!-- ═══════ BODY ═══════ -->
<div class="page" id="body-page">
  <div class="page-header">
    <div><div class="page-title">Body</div></div>
    <button class="btn btn-sm btn-primary" onclick="openLogMeasurement()">＋ Log</button>
  </div>
  <div class="stat-grid" id="body-stats"></div>
  <div class="chart-container">
    <div class="card-title">WEIGHT OVER TIME</div>
    <div class="chart-wrap"><canvas id="weight-chart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">LOG</div>
    <div id="meas-log"></div>
  </div>
</div>

<!-- ═══════ PROGRESS ═══════ -->
<div class="page" id="progress-page">
  <div class="page-header">
    <div><div class="page-title">Progress</div></div>
  </div>
  <div class="card" style="margin-bottom:12px;">
    <div class="card-title">TRACK AN EXERCISE</div>
    <select id="progress-ex-select" onchange="renderProgressChart()">
      <option value="">Select exercise...</option>
    </select>
  </div>
  <div class="chart-container" id="progress-chart-wrap" style="display:none;">
    <div class="card-title" id="progress-chart-label">STRENGTH OVER TIME</div>
    <div class="chart-wrap"><canvas id="strength-chart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">PERSONAL RECORDS 🏆</div>
    <div id="pr-list"></div>
  </div>
  <div class="card">
    <div class="card-title">ALL-TIME STATS</div>
    <div id="stats-summary"></div>
  </div>
</div>

<!-- ═══════ NAV ═══════ -->
<nav id="nav">
  <button class="nav-btn active" onclick="showPage('today')" id="nav-today">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Today
  </button>
  <button class="nav-btn" onclick="showPage('history')" id="nav-history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>History
  </button>
  <button class="nav-btn" onclick="showPage('body')" id="nav-body">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>Body
  </button>
  <button class="nav-btn" onclick="showPage('progress')" id="nav-progress">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Progress
  </button>
</nav>

<!-- ═══════ MODALS ═══════ -->

<!-- Add Exercise -->
<div class="modal-overlay" id="add-ex-modal" onclick="closeOnOverlay(event,'add-ex-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Exercise</div>
    <div class="form-group">
      <input type="text" id="ex-search-input" placeholder="Search by name or muscle..." oninput="filterEx()" autocomplete="off" />
    </div>
    <div id="ex-search-results" style="max-height:300px;overflow-y:auto;"></div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
      <label>Custom exercise</label>
      <div style="display:flex;gap:8px;margin-top:6px;">
        <input type="text" id="custom-ex-name" placeholder="Exercise name" style="flex:1;" />
        <button class="btn btn-primary btn-sm" onclick="addCustomEx()">Add</button>
      </div>
    </div>
  </div>
</div>

<!-- Equipment Config -->
<div class="modal-overlay" id="equip-modal" onclick="closeOnOverlay(event,'equip-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="equip-modal-title">Configure Exercise</div>
    <div class="form-group">
      <label>Equipment</label>
      <select id="equip-type-select" onchange="onEquipChange()">
        <option value="barbell">Barbell</option>
        <option value="ezbar">EZ Bar</option>
        <option value="smith">Smith Machine</option>
        <option value="dumbbell">Dumbbell</option>
        <option value="cable">Cable</option>
        <option value="machine">Machine / Stack</option>
        <option value="bodyweight">Bodyweight</option>
        <option value="kettlebell">Kettlebell</option>
        <option value="band">Resistance Band</option>
      </select>
    </div>
    <div id="barbell-options">
      <div class="form-group">
        <label>Weight entry</label>
        <select id="weight-mode-select">
          <option value="per-side">Plates per side → app shows total</option>
          <option value="total">Enter total weight directly</option>
        </select>
      </div>
      <div class="form-group">
        <label>Bar weight</label>
        <select id="bar-weight-select">
          <option value="45">Standard bar — 45 lbs</option>
          <option value="35">Smith Machine bar — 35 lbs</option>
          <option value="25">EZ bar — 25 lbs</option>
          <option value="15">Short bar — 15 lbs</option>
          <option value="0">No bar</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Unit</label>
      <select id="unit-select">
        <option value="lbs">lbs</option>
        <option value="kg">kg</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="confirmAddExercise()">Add to Workout</button>
    <button class="btn btn-secondary mt8" onclick="closeModal('equip-modal')">Cancel</button>
  </div>
</div>

<!-- Finish Workout -->
<div class="modal-overlay" id="finish-modal" onclick="closeOnOverlay(event,'finish-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Finish Workout?</div>
    <div id="finish-summary" style="margin-bottom:18px;"></div>
    <button class="btn btn-primary" onclick="finishWorkout()">Save Workout 💪</button>
    <button class="btn btn-secondary mt8" onclick="closeModal('finish-modal')">Keep Going</button>
    <button class="btn mt12" style="background:transparent;color:var(--danger);width:100%;" onclick="discardWorkout()">Discard</button>
  </div>
</div>

<!-- Log Measurement -->
<div class="modal-overlay" id="meas-modal" onclick="closeOnOverlay(event,'meas-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Log Measurements</div>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input type="date" id="meas-date" /></div>
      <div class="form-group"><label>Unit</label>
        <select id="meas-unit"><option value="lbs">lbs</option><option value="kg">kg</option></select>
      </div>
    </div>
    <div class="form-group"><label>Body Weight</label><input type="number" id="meas-weight" placeholder="e.g. 180" step="0.1" /></div>
    <div class="form-group"><label>Body Fat % (optional)</label><input type="number" id="meas-bf" placeholder="e.g. 15" step="0.1" /></div>
    <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;">BODY MEASUREMENTS (inches)</div>
    <div class="form-row">
      <div class="form-group"><label>Chest</label><input type="number" id="meas-chest" placeholder="—" step="0.25" /></div>
      <div class="form-group"><label>Waist</label><input type="number" id="meas-waist" placeholder="—" step="0.25" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Hips</label><input type="number" id="meas-hips" placeholder="—" step="0.25" /></div>
      <div class="form-group"><label>Arms</label><input type="number" id="meas-arms" placeholder="—" step="0.25" /></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Thighs</label><input type="number" id="meas-thighs" placeholder="—" step="0.25" /></div>
      <div class="form-group"><label>Shoulders</label><input type="number" id="meas-shoulders" placeholder="—" step="0.25" /></div>
    </div>
    <div class="form-group"><label>Notes</label><textarea id="meas-notes" rows="2" placeholder="How are you feeling?"></textarea></div>
    <button class="btn btn-primary" onclick="saveMeasurement()">Save</button>
  </div>
</div>

<!-- Workout Detail -->
<div class="modal-overlay" id="detail-modal" onclick="closeOnOverlay(event,'detail-modal')">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="detail-content"></div>
    <button class="btn btn-secondary mt16" onclick="closeModal('detail-modal')">Close</button>
    <button class="btn mt8" style="background:transparent;color:var(--danger);width:100%;" id="detail-delete-btn">Delete Workout</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
var IMG = 'https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/';

var DB = {
  get: function(k, d) { try { return JSON.parse(localStorage.getItem('il_'+k)) || d; } catch(e) { return d; } },
  set: function(k, v) { try { localStorage.setItem('il_'+k, JSON.stringify(v)); } catch(e) {} },
  workouts:     function() { return DB.get('workouts', []); },
  measurements: function() { return DB.get('measurements', []); },
  saveWorkout: function(w) {
    var ws = DB.workouts();
    var i = ws.findIndex(function(x){return x.id===w.id;});
    if (i>=0) ws[i]=w; else ws.unshift(w);
    DB.set('workouts', ws);
  },
  deleteWorkout: function(id) {
    DB.set('workouts', DB.workouts().filter(function(w){return w.id!==id;}));
  },
  saveMeas: function(m) {
    var ms = DB.measurements();
    ms.unshift(m);
    ms.sort(function(a,b){return b.date.localeCompare(a.date);});
    DB.set('measurements', ms);
  }
};

function uid() { return Math.random().toString(36).slice(2)+Date.now().toString(36); }

function showPage(name) {
  var pages = document.querySelectorAll('.page');
  for (var i=0;i<pages.length;i++) pages[i].classList.remove('active');
  var btns = document.querySelectorAll('.nav-btn');
  for (var i=0;i<btns.length;i++) btns[i].classList.remove('active');
  document.getElementById(name+'-page').classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name==='today')    renderToday();
  if (name==='history')  renderHistory();
  if (name==='body')     renderBody();
  if (name==='progress') renderProgress();
}

function renderToday() {
  var now = new Date();
  document.getElementById('today-date').textContent =
    now.toLocaleDateString('en-US', {weekday:'long', month:'long', day:'numeric'});

  var streak = calcStreak();
  var se = document.getElementById('streak-el');
  se.innerHTML = streak > 0
    ? '<div style="text-align:right"><div style="font-size:22px">🔥</div><div style="font-size:12px;color:var(--accent);font-weight:700">'+streak+' days</div></div>'
    : '';

  // Render focus grids
  var cg = document.getElementById('focus-compound-grid');
  cg.innerHTML = '';
  FOCUSES.compound.forEach(function(f) {
    var d = document.createElement('div');
    d.className = 'focus-tile';
    d.style.borderColor = 'transparent';
    d.innerHTML = '<div class="fi">'+f.icon+'</div><div class="fl">'+f.label+'</div>';
    d.onclick = function() { startWorkout(f.id); };
    cg.appendChild(d);
  });

  var mg = document.getElementById('focus-muscle-grid');
  mg.innerHTML = '';
  FOCUSES.muscle.forEach(function(f) {
    var d = document.createElement('div');
    d.className = 'focus-tile';
    d.style.borderColor = 'transparent';
    d.innerHTML = '<div class="fi">'+f.icon+'</div><div class="fl">'+f.label+'</div>';
    d.onclick = function() { startWorkout(f.id); };
    mg.appendChild(d);
  });

  // Recent
  var recent = DB.workouts().slice(0,3);
  var rc = document.getElementById('recent-home');
  if (!recent.length) {
    rc.innerHTML = '<div class="empty-state"><div class="empty-icon">🏋️</div><div class="empty-title">No workouts yet</div><p>Pick a focus above to start!</p></div>';
    return;
  }
  rc.innerHTML = recent.map(function(w) { return workoutCardHTML(w, false); }).join('');
}

function calcStreak() {
  var ws = DB.workouts();
  if (!ws.length) return 0;
  var dates = [];
  var seen = {};
  ws.forEach(function(w) { if (!seen[w.date]) { seen[w.date]=true; dates.push(w.date); } });
  dates.sort().reverse();
  var today = todayStr();
  var yest = new Date(Date.now()-86400000).toISOString().slice(0,10);
  if (dates[0]!==today && dates[0]!==yest) return 0;
  var s=1;
  for (var i=1;i<dates.length;i++) {
    var diff = (new Date(dates[i-1]) - new Date(dates[i])) / 86400000;
    if (diff<=1.5) s++; else break;
  }
  return s;
}

function todayStr() { return new Date().toISOString().slice(0,10); }

function startWorkout(focusId) {
  var allFocuses = FOCUSES.compound.concat(FOCUSES.muscle);
  var focus = null;
  for (var i=0;i<allFocuses.length;i++) {
    if (allFocuses[i].id===focusId) { focus=allFocuses[i]; break; }
  }

  activeWorkout = {
    id: uid(),
    name: focus ? focus.label : '',
    focusId: focusId,
    date: todayStr(),
    exercises: [],
  };

  document.getElementById('workout-name-input').value = activeWorkout.name;

  var badge = document.getElementById('active-focus-badge');
  if (focus) {
    badge.innerHTML = '<span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;background:'+focus.color+'22;color:'+focus.color+'">'+focus.icon+' '+focus.label+'</span>';
  } else {
    badge.innerHTML = '';
  }

  document.getElementById('no-workout-ui').style.display = 'none';
  document.getElementById('active-workout-ui').style.display = 'block';

  // Load template if compound focus
  if (focusId && TEMPLATES[focusId]) {
    TEMPLATES[focusId].forEach(function(name) {
      var ex = null;
      for (var i=0;i<EXERCISES.length;i++) { if (EXERCISES[i].name===name) {ex=EXERCISES[i];break;} }
      if (ex) {
        var equipCfg = EQUIP[ex.equip] || {};
        var wmode = equipCfg.hasBar ? 'per-side' : (equipCfg.isBW ? 'bodyweight' : 'direct');
        addExToWorkout(name, ex.equip, wmode, equipCfg.defaultBar||45, 'lbs');
      }
    });
  }
}

function openAddExercise() {
  document.getElementById('ex-search-input').value = '';
  filterEx();
  openModal('add-ex-modal');
  setTimeout(function(){ document.getElementById('ex-search-input').focus(); }, 300);
}

function filterEx() {
  var q = document.getElementById('ex-search-input').value.toLowerCase();
  var existing = {};
  if (activeWorkout) activeWorkout.exercises.forEach(function(e){existing[e.name]=true;});
  var results = EXERCISES.filter(function(e) {
    return !existing[e.name] && (!q || e.name.toLowerCase().indexOf(q)>=0 || e.muscle.toLowerCase().indexOf(q)>=0);
  }).slice(0,12);

  var html = '';
  results.forEach(function(ex) {
    html += '<div class="ex-search-item" onclick="openEquipModal(\''+ex.name.replace(/'/g,"\\'")+'\')">';
    html += '<img class="ex-search-thumb" src="'+IMG+ex.img+'/0.jpg" alt="'+ex.name+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" />';
    html += '<div class="ex-search-ph" style="display:none;">'+ex.icon+'</div>';
    html += '<div><div class="ex-search-name">'+ex.name+'</div>';
    html += '<div class="ex-search-sub">'+ex.muscle+' &nbsp;·&nbsp; '+(EQUIP[ex.equip]?EQUIP[ex.equip].label:ex.equip)+'</div></div>';
    html += '</div>';
  });
  document.getElementById('ex-search-results').innerHTML = html;
}

function addCustomEx() {
  var name = document.getElementById('custom-ex-name').value.trim();
  if (!name) return;
  openEquipModal(name);
}

function openEquipModal(exName) {
  pendingEx = exName;
  document.getElementById('equip-modal-title').textContent = exName;
  var ex = null;
  for (var i=0;i<EXERCISES.length;i++){if(EXERCISES[i].name===exName){ex=EXERCISES[i];break;}}
  var equipType = ex ? ex.equip : 'barbell';
  document.getElementById('equip-type-select').value = equipType;
  var equipCfg = EQUIP[equipType] || {};
  document.getElementById('weight-mode-select').value = equipCfg.hasBar ? 'per-side' : 'direct';
  document.getElementById('bar-weight-select').value = equipCfg.defaultBar || 45;
  onEquipChange();
  closeModal('add-ex-modal');
  openModal('equip-modal');
}

function onEquipChange() {
  var equip = document.getElementById('equip-type-select').value;
  var hasBar = EQUIP[equip] && EQUIP[equip].hasBar;
  document.getElementById('barbell-options').style.display = hasBar ? 'block' : 'none';
  if (equip==='ezbar') document.getElementById('bar-weight-select').value='25';
  else if (equip==='smith') document.getElementById('bar-weight-select').value='35';
  else if (equip==='barbell') document.getElementById('bar-weight-select').value='45';
}

function confirmAddExercise() {
  if (!pendingEx) return;
  var equip = document.getElementById('equip-type-select').value;
  var equipCfg = EQUIP[equip] || {};
  var wmode;
  if (equipCfg.hasBar) wmode = document.getElementById('weight-mode-select').value;
  else if (equipCfg.isBW) wmode = 'bodyweight';
  else wmode = 'direct';
  var barWeight = parseInt(document.getElementById('bar-weight-select').value)||0;
  var unit = document.getElementById('unit-select').value;
  addExToWorkout(pendingEx, equip, wmode, barWeight, unit);
  pendingEx = null;
  closeModal('equip-modal');
}

function addExToWorkout(name, equip, wmode, barWeight, unit) {
  if (!activeWorkout) return;
  activeWorkout.exercises.push({
    id: uid(), name:name, equip:equip, weightMode:wmode,
    barWeight:barWeight||0, unit:unit||'lbs',
    sets:[{id:uid(), w:'', reps:'', done:false}]
  });
  renderExercises();
}

function renderExercises() {
  var html = '';
  activeWorkout.exercises.forEach(function(ex) { html += renderExCard(ex); });
  document.getElementById('exercises-container').innerHTML = html;
}

function renderExCard(ex) {
  var dbEx = null;
  for (var i=0;i<EXERCISES.length;i++){if(EXERCISES[i].name===ex.name){dbEx=EXERCISES[i];break;}}
  var imgHtml = dbEx
    ? '<img class="ex-thumb" src="'+IMG+dbEx.img+'/0.jpg" alt="'+ex.name+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';" /><div class="ex-thumb-ph" style="display:none;">'+dbEx.icon+'</div>'
    : '<div class="ex-thumb-ph">💪</div>';

  var eqLabel = EQUIP[ex.equip] ? EQUIP[ex.equip].label : ex.equip;
  var modeLabel = ex.weightMode==='per-side' ? 'Per side' : ex.weightMode==='bodyweight' ? 'Bodyweight' : 'Total';

  var colHeader = '';
  if (ex.weightMode==='per-side') {
    colHeader = '<div class="set-col-header grid-perside"><div></div><div style="text-align:center">PLATES/SIDE</div><div style="text-align:center">TOTAL</div><div style="text-align:center">REPS</div><div></div></div>';
  } else if (ex.weightMode==='bodyweight') {
    colHeader = '<div class="set-col-header grid-bw"><div></div><div style="text-align:center">+WEIGHT</div><div></div><div style="text-align:center">REPS</div><div></div></div>';
  } else {
    colHeader = '<div class="set-col-header grid-direct"><div></div><div style="text-align:center">WEIGHT</div><div></div><div style="text-align:center">REPS</div><div></div></div>';
  }

  var setRows = '';
  ex.sets.forEach(function(s, i) { setRows += renderSetRow(ex, s, i); });

  return '<div class="ex-card" id="excard-'+ex.id+'">'
    + '<div class="ex-header">'
    + imgHtml
    + '<div class="ex-info"><div class="ex-name">'+ex.name+'</div>'
    + '<div class="ex-meta"><span class="eq-badge">'+eqLabel+'</span>'+modeLabel+' · '+ex.unit+'</div></div>'
    + '<button class="icon-btn danger" onclick="removeEx(\''+ex.id+'\')">✕</button>'
    + '</div>'
    + colHeader
    + setRows
    + '<div class="set-add-row"><button class="btn btn-secondary btn-xs" onclick="addSet(\''+ex.id+'\')">＋ Add Set</button></div>'
    + '</div>';
}

function renderSetRow(ex, s, idx) {
  var doneClass = s.done ? 'done' : '';
  var numEl = '<div class="set-num '+doneClass+'" id="snum-'+s.id+'">'+( idx+1)+'</div>';
  var doneBtn = '<button class="done-btn '+doneClass+'" id="sdone-'+s.id+'" onclick="toggleDone(\''+ex.id+'\',\''+s.id+'\')">'+(s.done?'✓':'○')+'</button>';

  if (ex.weightMode === 'per-side') {
    var total = calcTotal(ex, s.w);
    var totalDisp = s.w !== '' ? total+' '+ex.unit : '—';
    return '<div class="set-row grid-perside">'
      + numEl
      + '<input class="set-input" type="number" inputmode="decimal" placeholder="0" value="'+s.w+'"'
      + ' onchange="updateSet(\''+ex.id+'\',\''+s.id+'\',\'w\',this.value)"'
      + ' oninput="liveTotal(\''+ex.id+'\',\''+s.id+'\',this.value)" />'
      + '<div class="set-total" id="stotal-'+s.id+'">'+totalDisp+'</div>'
      + '<input class="set-input" type="number" inputmode="numeric" placeholder="0" value="'+s.reps+'"'
      + ' onchange="updateSet(\''+ex.id+'\',\''+s.id+'\',\'reps\',this.value)" />'
      + doneBtn + '</div>';
  }
  if (ex.weightMode === 'bodyweight') {
    return '<div class="set-row grid-bw">'
      + numEl
      + '<input class="set-input" type="number" inputmode="decimal" placeholder="0" value="'+s.w+'"'
      + ' onchange="updateSet(\''+ex.id+'\',\''+s.id+'\',\'w\',this.value)" />'
      + '<div class="set-lbl">BW<br>+extra</div>'
      + '<input class="set-input" type="number" inputmode="numeric" placeholder="0" value="'+s.reps+'"'
      + ' onchange="updateSet(\''+ex.id+'\',\''+s.id+'\',\'reps\',this.value)" />'
      + doneBtn + '</div>';
  }
  // direct
  var lbl = ex.equip==='dumbbell' ? 'each' : ex.unit;
  return '<div class="set-row grid-direct">'
    + numEl
    + '<input class="set-input" type="number" inputmode="decimal" placeholder="0" value="'+s.w+'"'
    + ' onchange="updateSet(\''+ex.id+'\',\''+s.id+'\',\'w\',this.value)" />'
    + '<div class="set-lbl">'+lbl+'</div>'
    + '<input class="set-input" type="number" inputmode="numeric" placeholder="0" value="'+s.reps+'"'
    + ' onchange="updateSet(\''+ex.id+'\',\''+s.id+'\',\'reps\',this.value)" />'
    + doneBtn + '</div>';
}

function calcTotal(ex, plates) {
  return (parseFloat(plates)||0)*2 + (ex.barWeight||0);
}

function liveTotal(exId, setId, val) {
  var ex = activeWorkout && activeWorkout.exercises.filter(function(e){return e.id===exId;})[0];
  if (!ex || ex.weightMode!=='per-side') return;
  var el = document.getElementById('stotal-'+setId);
  if (el) el.textContent = val!=='' ? calcTotal(ex,val)+' '+ex.unit : '—';
}

function updateSet(exId, setId, field, val) {
  var ex = activeWorkout && activeWorkout.exercises.filter(function(e){return e.id===exId;})[0];
  if (!ex) return;
  var s = ex.sets.filter(function(s){return s.id===setId;})[0];
  if (!s) return;
  s[field] = field==='reps' ? (parseInt(val)||'') : (parseFloat(val)||'');
}

function toggleDone(exId, setId) {
  var ex = activeWorkout && activeWorkout.exercises.filter(function(e){return e.id===exId;})[0];
  if (!ex) return;
  var s = ex.sets.filter(function(s){return s.id===setId;})[0];
  if (!s) return;
  s.done = !s.done;
  var num = document.getElementById('snum-'+setId);
  var btn = document.getElementById('sdone-'+setId);
  if (num) { if(s.done) num.classList.add('done'); else num.classList.remove('done'); }
  if (btn) { if(s.done){btn.classList.add('done');btn.textContent='✓';}else{btn.classList.remove('done');btn.textContent='○';} }
}

function addSet(exId) {
  var ex = activeWorkout && activeWorkout.exercises.filter(function(e){return e.id===exId;})[0];
  if (!ex) return;
  var last = ex.sets[ex.sets.length-1];
  ex.sets.push({id:uid(), w:last?last.w:'', reps:last?last.reps:'', done:false});
  renderExercises();
}

function removeEx(exId) {
  activeWorkout.exercises = activeWorkout.exercises.filter(function(e){return e.id!==exId;});
  renderExercises();
}

function confirmFinish() {
  activeWorkout.name = document.getElementById('workout-name-input').value || 'Workout';
  var sets = 0;
  activeWorkout.exercises.forEach(function(e){
    e.sets.forEach(function(s){if(s.w||s.reps) sets++;});
  });
  var vol = calcVol(activeWorkout);
  document.getElementById('finish-summary').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">'
    + '<div class="stat-box"><div class="stat-val">'+activeWorkout.exercises.length+'</div><div class="stat-label">Exercises</div></div>'
    + '<div class="stat-box"><div class="stat-val">'+sets+'</div><div class="stat-label">Sets</div></div>'
    + '<div class="stat-box"><div class="stat-val">'+fmtVol(vol)+'</div><div class="stat-label">Volume</div></div>'
    + '</div>';
  openModal('finish-modal');
}

function finishWorkout() {
  activeWorkout.name = document.getElementById('workout-name-input').value || 'Workout';
  activeWorkout.exercises.forEach(function(ex){
    ex.sets = ex.sets.filter(function(s){return s.w||s.reps;});
  });
  activeWorkout.exercises = activeWorkout.exercises.filter(function(ex){return ex.sets.length>0;});
  DB.saveWorkout(activeWorkout);
  activeWorkout = null;
  closeModal('finish-modal');
  document.getElementById('active-workout-ui').style.display='none';
  document.getElementById('no-workout-ui').style.display='block';
  renderToday();
  showToast('Workout saved! 💪');
}

function discardWorkout() {
  activeWorkout = null;
  closeModal('finish-modal');
  document.getElementById('active-workout-ui').style.display='none';
  document.getElementById('no-workout-ui').style.display='block';
}

// ═══════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════
function renderHistory() {
  var ws = DB.workouts();
  document.getElementById('history-count').textContent = ws.length+' workout'+(ws.length!==1?'s':'');
  var el = document.getElementById('history-list');
  if (!ws.length) {
    el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">No history yet</div></div>';
    return;
  }
  var byMonth = {};
  ws.forEach(function(w){
    var m=w.date.slice(0,7);
    if(!byMonth[m]) byMonth[m]=[];
    byMonth[m].push(w);
  });
  var months = Object.keys(byMonth).sort().reverse();
  var html = '';
  months.forEach(function(m){
    html += '<div class="sec-label">'+new Date(m+'-15').toLocaleDateString('en-US',{month:'long',year:'numeric'})+'</div>';
    byMonth[m].forEach(function(w){ html += workoutCardHTML(w, true); });
  });
  el.innerHTML = html;
}

function workoutCardHTML(w, clickable) {
  var vol = calcVol(w);
  var sets = 0; w.exercises.forEach(function(e){sets+=e.sets.length;});
  var allFocuses = FOCUSES.compound.concat(FOCUSES.muscle);
  var focus = null;
  for(var i=0;i<allFocuses.length;i++){if(allFocuses[i].id===w.focusId){focus=allFocuses[i];break;}}
  var click = clickable ? 'onclick="openDetail(\''+w.id+'\')"' : '';
  return '<div class="h-item" '+click+'>'
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start;">'
    + '<div><div class="h-name">'+(focus?focus.icon+' ':'')+' '+(w.name||'Workout')+'</div>'
    + (focus?'<div style="font-size:12px;color:'+focus.color+';font-weight:600;margin-top:2px;">'+focus.label+'</div>':'')
    + '</div><div class="h-date">'+fmtDate(w.date)+'</div></div>'
    + '<div class="h-meta">'
    + '<div class="h-stat">Exercises: <span>'+w.exercises.length+'</span></div>'
    + '<div class="h-stat">Sets: <span>'+sets+'</span></div>'
    + '<div class="h-stat">Volume: <span>'+fmtVol(vol)+'</span></div>'
    + '</div></div>';
}

function openDetail(id) {
  var ws = DB.workouts();
  var w = null; for(var i=0;i<ws.length;i++){if(ws[i].id===id){w=ws[i];break;}}
  if (!w) return;
  var sets=0; w.exercises.forEach(function(e){sets+=e.sets.length;});
  var vol=calcVol(w);
  var html='<div class="modal-title">'+(w.name||'Workout')+'</div>'
    +'<div style="color:var(--muted);font-size:13px;margin-bottom:16px;">'+fmtDate(w.date)+'</div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;">'
    +'<div class="stat-box"><div class="stat-val">'+w.exercises.length+'</div><div class="stat-label">Exercises</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+sets+'</div><div class="stat-label">Sets</div></div>'
    +'<div class="stat-box"><div class="stat-val">'+fmtVol(vol)+'</div><div class="stat-label">Volume</div></div>'
    +'</div>';
  w.exercises.forEach(function(ex){
    html+='<div style="margin-bottom:16px;"><div style="font-size:15px;font-weight:700;margin-bottom:8px;">'+ex.name
      +'<span class="eq-badge" style="margin-left:6px;">'+(EQUIP[ex.equip]?EQUIP[ex.equip].label:ex.equip)+'</span></div>';
    ex.sets.forEach(function(s,i){
      var wLabel;
      if(ex.weightMode==='per-side') wLabel=(s.w||0)+' '+ex.unit+'/side = '+calcTotal(ex,s.w)+' '+ex.unit;
      else if(ex.weightMode==='bodyweight') wLabel='Bodyweight'+(s.w?'+'+s.w+' '+ex.unit:'');
      else wLabel=(s.w||'—')+' '+(ex.equip==='dumbbell'?ex.unit+' each':ex.unit);
      html+='<div style="display:flex;gap:12px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted);">'
        +'<div style="width:40px;">Set '+(i+1)+'</div>'
        +'<div style="color:var(--text);font-weight:600;">'+wLabel+'</div>'
        +'<div>×</div>'
        +'<div style="color:var(--text);font-weight:600;">'+(s.reps||'—')+' reps</div></div>';
    });
    html+='</div>';
  });
  document.getElementById('detail-content').innerHTML = html;
  document.getElementById('detail-delete-btn').onclick = function(){
    if(confirm('Delete this workout?')){DB.deleteWorkout(id);closeModal('detail-modal');renderHistory();showToast('Deleted');}
  };
  openModal('detail-modal');
}

// ═══════════════════════════════════════════
// BODY
// ═══════════════════════════════════════════
function renderBody() {
  var ms = DB.measurements();
  renderBodyStats(ms); renderMeasLog(ms); renderWeightChart(ms);
}

function renderBodyStats(ms) {
  var latest=ms[0], prev=ms[1];
  var el=document.getElementById('body-stats');
  if (!latest){
    el.innerHTML='<div style="grid-column:1/-1" class="card"><div class="empty-state" style="padding:24px 0"><div class="empty-icon">⚖️</div><div class="empty-title">No data yet</div></div></div>';
    return;
  }
  var unit=latest.weightUnit||'lbs';
  var html='';
  if (latest.weight) {
    var diff = prev&&prev.weight!=null ? (latest.weight-prev.weight).toFixed(1) : null;
    var cls = diff!==null ? (parseFloat(diff)>0?'pos':'neg') : '';
    html+='<div class="stat-box"><div class="stat-val">'+latest.weight+'<span class="stat-val-unit">'+unit+'</span></div>'
      +'<div class="stat-label">Body Weight</div>'
      +(diff!==null?'<div class="stat-change '+cls+'">'+(parseFloat(diff)>0?'+':'')+diff+' '+unit+'</div>':'')
      +'</div>';
  }
  if (latest.bodyFat) {
    var diff2 = prev&&prev.bodyFat!=null ? (latest.bodyFat-prev.bodyFat).toFixed(1) : null;
    var cls2 = diff2!==null ? (parseFloat(diff2)>0?'pos':'neg') : '';
    html+='<div class="stat-box"><div class="stat-val">'+latest.bodyFat+'<span class="stat-val-unit">%</span></div>'
      +'<div class="stat-label">Body Fat</div>'
      +(diff2!==null?'<div class="stat-change '+cls2+'">'+(parseFloat(diff2)>0?'+':'')+diff2+'%</div>':'')
      +'</div>';
  }
  el.innerHTML = html || '<div style="grid-column:1/-1;color:var(--muted);text-align:center;padding:16px;">Log measurements above</div>';
}

function renderMeasLog(ms) {
  var el=document.getElementById('meas-log');
  if(!ms.length){el.innerHTML='<div style="color:var(--muted);text-align:center;padding:16px;">No entries yet</div>';return;}
  var html='';
  ms.forEach(function(m){
    var unit=m.weightUnit||'lbs';
    var parts=[];
    if(m.weight) parts.push('Weight: '+m.weight+' '+unit);
    if(m.bodyFat) parts.push('BF: '+m.bodyFat+'%');
    if(m.chest) parts.push('Chest: '+m.chest+'"');
    if(m.waist) parts.push('Waist: '+m.waist+'"');
    if(m.hips) parts.push('Hips: '+m.hips+'"');
    if(m.arms) parts.push('Arms: '+m.arms+'"');
    html+='<div class="meas-row" style="flex-direction:column;align-items:flex-start;gap:4px;">'
      +'<div style="font-weight:600;">'+fmtDate(m.date)+'</div>'
      +'<div style="font-size:13px;color:var(--muted);">'+parts.join(' · ')+'</div>'
      +(m.notes?'<div style="font-size:12px;color:var(--muted);font-style:italic;">'+m.notes+'</div>':'')
      +'</div>';
  });
  el.innerHTML=html;
}

function renderWeightChart(ms) {
  var data=ms.filter(function(m){return m.weight;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  if(charts.weight){charts.weight.destroy();charts.weight=null;}
  if(!data.length)return;
  var ctx=document.getElementById('weight-chart').getContext('2d');
  charts.weight=new Chart(ctx,{type:'line',data:{labels:data.map(function(m){return fmtDateShort(m.date);}),datasets:[{data:data.map(function(m){return m.weight;}),borderColor:'#ff6b35',backgroundColor:'rgba(255,107,53,0.1)',fill:true,tension:0.4,pointRadius:4,pointBackgroundColor:'#ff6b35'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8e8e93',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#8e8e93',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}}}}});
}

function openLogMeasurement() {
  document.getElementById('meas-date').value=todayStr();
  ['weight','bf','chest','waist','hips','arms','thighs','shoulders'].forEach(function(f){
    var el=document.getElementById('meas-'+f); if(el)el.value='';
  });
  document.getElementById('meas-notes').value='';
  openModal('meas-modal');
}

function saveMeasurement() {
  var m={
    id:uid(),
    date:document.getElementById('meas-date').value||todayStr(),
    weightUnit:document.getElementById('meas-unit').value,
    weight:parseFloat(document.getElementById('meas-weight').value)||null,
    bodyFat:parseFloat(document.getElementById('meas-bf').value)||null,
    chest:parseFloat(document.getElementById('meas-chest').value)||null,
    waist:parseFloat(document.getElementById('meas-waist').value)||null,
    hips:parseFloat(document.getElementById('meas-hips').value)||null,
    arms:parseFloat(document.getElementById('meas-arms').value)||null,
    thighs:parseFloat(document.getElementById('meas-thighs').value)||null,
    shoulders:parseFloat(document.getElementById('meas-shoulders').value)||null,
    notes:document.getElementById('meas-notes').value.trim()||null,
  };
  if(!m.weight&&!m.chest&&!m.waist){alert('Enter at least one measurement.');return;}
  DB.saveMeas(m);
  closeModal('meas-modal');
  renderBody();
  showToast('Saved!');
}

// ═══════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════
function renderProgress() {
  var ws=DB.workouts();
  var nameSet={};
  ws.forEach(function(w){w.exercises.forEach(function(e){nameSet[e.name]=true;});});
  var names=Object.keys(nameSet).sort();
  var sel=document.getElementById('progress-ex-select');
  var cur=sel.value;
  sel.innerHTML='<option value="">Select exercise...</option>';
  names.forEach(function(n){
    var opt=document.createElement('option');
    opt.value=n; opt.textContent=n;
    if(n===cur)opt.selected=true;
    sel.appendChild(opt);
  });
  renderProgressChart();
  renderPRs(ws);
  renderStatsSummary(ws);
}

function renderProgressChart() {
  var ex=document.getElementById('progress-ex-select').value;
  var wrap=document.getElementById('progress-chart-wrap');
  if(!ex){wrap.style.display='none';return;}
  wrap.style.display='block';
  document.getElementById('progress-chart-label').textContent=ex.toUpperCase()+' — MAX WEIGHT';
  var ws=DB.workouts();
  var pts=[];
  ws.filter(function(w){return w.exercises.some(function(e){return e.name===ex;});})
    .sort(function(a,b){return a.date.localeCompare(b.date);})
    .forEach(function(w){
      var exObj=null;for(var i=0;i<w.exercises.length;i++){if(w.exercises[i].name===ex){exObj=w.exercises[i];break;}}
      if(!exObj)return;
      var maxW=0;
      exObj.sets.forEach(function(s){
        var weight=exObj.weightMode==='per-side'?calcTotal(exObj,s.w):(parseFloat(s.w)||0);
        if(weight>maxW)maxW=weight;
      });
      if(maxW>0)pts.push({date:w.date,weight:maxW});
    });
  if(charts.strength){charts.strength.destroy();charts.strength=null;}
  if(!pts.length)return;
  var ctx=document.getElementById('strength-chart').getContext('2d');
  charts.strength=new Chart(ctx,{type:'line',data:{labels:pts.map(function(d){return fmtDateShort(d.date);}),datasets:[{data:pts.map(function(d){return d.weight;}),borderColor:'#ff6b35',backgroundColor:'rgba(255,107,53,0.1)',fill:true,tension:0.4,pointRadius:5,pointBackgroundColor:'#ff6b35'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8e8e93',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#8e8e93',font:{size:11}},grid:{color:'rgba(255,255,255,0.05)'}}}}});
}

function renderPRs(ws) {
  var prs={};
  ws.forEach(function(w){
    w.exercises.forEach(function(ex){
      ex.sets.forEach(function(s){
        var weight=ex.weightMode==='per-side'?calcTotal(ex,s.w):(parseFloat(s.w)||0);
        if(weight>(prs[ex.name]?prs[ex.name].weight:0)) prs[ex.name]={weight:weight,unit:ex.unit||'lbs'};
      });
    });
  });
  var el=document.getElementById('pr-list');
  var entries=Object.keys(prs).map(function(n){return{name:n,weight:prs[n].weight,unit:prs[n].unit};});
  entries.sort(function(a,b){return b.weight-a.weight;});
  entries=entries.slice(0,15);
  if(!entries.length){el.innerHTML='<div style="color:var(--muted);padding:8px 0;">Log workouts to see PRs</div>';return;}
  var html='';
  entries.forEach(function(e){
    html+='<div class="pr-row"><div style="font-weight:500">'+e.name+'</div><div class="pr-val">'+e.weight+' '+e.unit+'</div></div>';
  });
  el.innerHTML=html;
}

function renderStatsSummary(ws) {
  var el=document.getElementById('stats-summary');
  if(!ws.length){el.innerHTML='<div style="color:var(--muted)">No workouts yet</div>';return;}
  var totalVol=0; ws.forEach(function(w){totalVol+=calcVol(w);});
  var totalSets=0; ws.forEach(function(w){w.exercises.forEach(function(e){totalSets+=e.sets.length;});});
  el.innerHTML='<div class="meas-row"><div class="meas-lbl">Total Workouts</div><div style="font-weight:600">'+ws.length+'</div></div>'
    +'<div class="meas-row"><div class="meas-lbl">Total Volume</div><div style="font-weight:600">'+fmtVol(totalVol)+'</div></div>'
    +'<div class="meas-row"><div class="meas-lbl">Total Sets</div><div style="font-weight:600">'+totalSets+'</div></div>'
    +'<div class="meas-row"><div class="meas-lbl">Current Streak</div><div style="font-weight:600">'+calcStreak()+' days 🔥</div></div>';
}

// ═══════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeOnOverlay(e,id){if(e.target===e.currentTarget)closeModal(id);}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function calcVol(w) {
  var total=0;
  w.exercises.forEach(function(ex){
    ex.sets.forEach(function(s){
      var weight=ex.weightMode==='per-side'?calcTotal(ex,s.w):(parseFloat(s.w)||0);
      total+=weight*(parseFloat(s.reps)||0);
    });
  });
  return total;
}
function fmtVol(v){if(v>=1000000)return(v/1000000).toFixed(1)+'M';if(v>=1000)return(v/1000).toFixed(1)+'K';return Math.round(v).toString();}
function fmtDate(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtDateShort(d){return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function showToast(msg,dur){
  dur=dur||2500;
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},dur);
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
try {
  renderToday();
} catch(e) {
  document.body.innerHTML = '<div style="padding:40px 24px;font-family:-apple-system,sans-serif;color:#fff;background:#0f0f0f;min-height:100vh;">'
    + '<div style="font-size:24px;font-weight:700;color:#ff6b35;margin-bottom:16px;">⚠️ IronLog Error</div>'
    + '<p style="color:#8e8e93;margin-bottom:12px;">Something went wrong loading the app. Please screenshot this and send it.</p>'
    + '<pre style="background:#1c1c1e;border-radius:10px;padding:14px;font-size:13px;color:#ff453a;white-space:pre-wrap;word-break:break-all;">' + (e.message + '\n\n' + (e.stack||'')) + '</pre>'
    + '<button onclick="location.reload()" style="margin-top:20px;background:#ff6b35;color:#fff;border:none;padding:14px 24px;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;">Reload</button>'
    + '</div>';
}
</script>
</body>
